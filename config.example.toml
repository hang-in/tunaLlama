# tunaLlama 설정 예시 — `~/.tunallama/config.toml` 또는 프로젝트 로컬 `.tunallama/config.toml` 로 복사 후 수정.

[llm]
# provider: ollama | ollama_cloud | lmstudio
provider = "ollama"
# 공통 파라미터
temperature = 0.3
timeout_seconds = 300

[llm.ollama]
# 로컬 Ollama 데몬
host = "http://localhost:11434"
model = "qwen2.5:32b"
num_ctx = 8192

[llm.ollama_cloud]
# Ollama Cloud (https://ollama.com). API 키는 환경변수로만 받음.
# 모델은 cloud catalog 에 서빙 중인 것만 가능 — `Client.list()` 로 확인.
host = "https://ollama.com"
api_key_env = "OLLAMA_CLOUD_API_KEY"
model = "gemma4:31b"

[llm.lmstudio]
# LM Studio는 OpenAI 호환 엔드포인트 제공. 기본 1234 포트.
host = "http://localhost:1234/v1"
model = "qwen2.5-coder-32b-instruct"
# LM Studio 로컬 모드는 키가 무의미하지만 일부 클라이언트가 헤더를 요구함.
api_key = "lm-studio"

[memory]
db_path = "~/.tunallama/memory.db"
# kiwi(권장) | konlpy_okt | none
korean_tokenizer = "kiwi"
enable_logging = true
enable_recall = true
# Phase 4: 벡터 임베딩 on/off. false 면 BM25 path 만 살아있음.
enable_embeddings = true
# Phase 9: 임베딩은 Ollama /api/embed 사용 (torch 불필요, GPU 는 Ollama 가 자동 관리).
# 모델은 Ollama 태그. dim 1024 모델만 (스키마 고정). 환경변수 TUNA_EMBEDDING_MODEL 우선.
# 후보:
#   qwen3-embedding:0.6b (default)  다국어, bge-m3 의 NaN 버그 해결, 1024-dim
#   bge-m3                          다국어, 1024-dim
embedding_model = "qwen3-embedding:0.6b"
# 임베딩 host 는 [llm.ollama].host 를 재사용 (환경변수 TUNA_EMBEDDING_HOST 로 override).
#
# auto | cpu | mps | cuda. Phase 9 이후 임베딩엔 무의미(Ollama 가 device 관리).
# 옵셔널 reranker([rerank] extra, sentence-transformers) 전용. TUNA_EMBEDDING_DEVICE 우선.
embedding_device = "auto"

[routing]
# always | on_request | never
auto_recall = "on_request"
recall_limit = 5

[logging]
level = "INFO"
file = "~/.tunallama/tunallama.log"
